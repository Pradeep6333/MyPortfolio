<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
        <style>
            *{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }
            
            body{
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            header{
                display: flex;
                justify-content: space-between;
                height: 15%;
                align-items: center;
                padding: 25px 50px;  
            }

            .title{
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .logo{
                width: 35px;
                height: 35px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                color: rgb(242, 92, 84);
                background: #fff;
                border-radius: 6px;
                box-shadow: 0 6px 18px rgb(227, 227, 227);
                margin-right: 12px;
            }
    
            header h2{  
                letter-spacing: 6px;
                font-size: 20px;
            }

            nav{
                display: flex;
                gap: 22px;
            }

            header nav a{
                text-decoration: none;
                color: black;
                font-weight:bold;
                font-size: small;
                padding: 5px 10px ;
                border-radius: 3px;
                background-color: white;
                transition: 0.3s;
                box-shadow: 0 3px 6px rgb(213, 213, 213);
            }

            #projects{
                text-decoration: none;
                color: white;
                background-color:rgb(242, 92, 84);
                border:1px solid rgb(242, 92, 84);
                font-weight: 500;
                font-size: medium;
                padding: 8px 10px;
                border-radius: 5px;
                margin-right: 10px;
            }
            
            #projects:hover{
                background-color: rgb(233, 237, 242);
                color: rgb(242, 92, 84);
                cursor: pointer;
                border: 1px solid rgb(242, 92, 84);
                transition: 0.3s;
            }

            

            nav a:hover{
                color: rgb(242, 92, 84);
                box-shadow: 0 3px 10px gray;
            }
            
            main{
                display: flex;
                flex-direction:row;
                align-items: center;
                justify-content: center;
                height: 70%;
                background-color: rgb(233, 237, 242);

            }

            nav a.active{
                color:rgb(242, 92, 84);

            }

            footer{
                display: flex;
                height: 15%;
                padding: 30px;
                justify-content: center;
            }

            .abtme h1{
                font-family: 'Playfair Display', serif;
                letter-spacing:1px;
                font-weight: 1000;
                font-size: 35px;
                line-height: 1.3;
                color: #182f48;
                margin-bottom: 50px;
            }

            .abtme{
                width: 85%;
                color: #182f48;
                margin-left:333px ;
                margin-right: 0px;
                display:inline-block ;
            }

            .abtme p{
                width: 30%;
            }

            .abtme p span{
                line-height: 5;
                font-size: small;
                font-weight:600;
                color:rgb(242, 92, 84);

            }

            
            .pic img{
                height: 300px;
                border-radius: 400px;
                background-color: #E9EDF2;
                box-shadow: 12px 14px 10px rgb(184, 185, 186);
            }

            .pic{
                margin-left: 0px;
                margin-right: 300px;
            }
        </style>
    </head>
    <body>

        <header>
            <div class="title">
                <button class="logo"><img width="35" src="PF Logo.png" alt="Logo"></button>
                <h2 >PORTFOLIO</h2>
            </div>
            <nav>
                <a class="active" href="index.html">Home</a>
                <a class="" href="port_about.html">About</a>
                <a class="" href="port_skills.html">Skills</a>
                <a class="" href="port_projects.html">Projects</a>
                <a class="" href="port_contact.html">Contact</a>
            </nav>
        </header>

        <main>
            
            <div class="abtme">
        
                <h1>I'm Pradeep<br>Designer & Web Developer</h1>
            <p>I design and build responsive websites that are fast, modern, and tailored to your business goals.</br><span>TURNING IDEAS INTO REALITY.</span></p>

            <div>
                <a id="projects" class="" href="port_projects.html">See Projects</a>
            </div>
            </div>

            <div class="pic">
                <img src="AAAA.png" alt="MyPhoto">
            </div>


            

        </main>


        <footer>
            <p>&copy; My Portfolio</p>
        </footer>
        

    </body>
</html>
