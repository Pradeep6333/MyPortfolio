<!DOCTYPE html>
<html lang="en">
    <head>
        <title>College Feedback System</title>
        <meta charset="UTF-8">
        <meta content="width=device-width, initial-scale=1.0">

        <style>

            *{
                box-sizing: border-box;
            }
            
            body{
                font-family: Arial, Helvetica, sans-serif;
                background-color: white;
                margin: 0;
                width: 700px;
                box-shadow: 0px 4px 12px rgb(113, 113, 113);
                margin: 40px auto;
            }

            header{
                color: aliceblue;
                background-color: rgb(30, 30, 118);
                text-align: center;
                padding: 20px;
            }

            main{
                background-color: white;
                padding:20px 30px;
                border-radius: 10px ;
                box-shadow: 0px 1px 6px grey;
                width: 600px;
                margin: 20px auto;

            }

            label{
                font-weight: bold;
            }

            input, textarea, select{
                width: 100%;
                padding: 10px;
                margin-top: 6px;
                margin-bottom: 12px;
            }

            footer{
                text-align: center;
                color: #333;
                font-size: 13px;
                padding: 15px;
            }

            footer span{
                color: rgb(30, 30, 118);
                font-weight: bold;
            }
            textarea{
                font-family: Arial, Helvetica, sans-serif;
                height: 90px;
                resize: none;
            }
            input:focus, textarea:focus, select:focus{
                outline: none;
                border:2px solid blue;
                border-color: rgb(30, 30, 118);
                box-shadow: 0px 1px 10px rgba(30,30,117,0.4);
            }

            .submit{
                background-color: rgb(30, 30, 118);
                color:white;
                border:none;

            }
            .reset{
                background-color: #e6e6e6;
                border: 1px solid #999;

            }
            .reset:focus{
                border:none;
                box-shadow: none;
                outline: none;
            }

            .reset:active{
                outline: none;
                border-color: rgb(30, 30, 118);
                box-shadow: 0px 1px 10px rgba(30,30,117,0.4);;

            }

            .submit:focus{
                border:none;
                box-shadow: none;
                outline: none;
            }

            .submit:active{
                outline: none;
                border-color: rgb(30, 30, 118);
                box-shadow: 0px 1px 10px rgba(30,30,117,0.4);;

            }
            .submit, .reset{
                width: 150px;
                height: 40px;
                font-size: 15px;
                cursor: pointer;
            }
            .btns{
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 30px;
                margin-top: 20px;

            }

        </style>
    </head>

    <body>
        <header>
            <h1>College Feedback System</h1>
            <p>KLH University Hyderabad</p>
        </header>

        <main>
            <h2>
                Feedback Form
            </h2>
            <hr>

            <form>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>


                <label for="email">Email</label>
                <input type="email"  id="email" placeholder="abc@gmail.com" required>


                <label for="dep">Department</label>
                <select  id="dep">
                    <option value="">Select</option>
                    <option value="cse">CSE</option>
                    <option value="ece">ECE</option>
                    <option value="aids">AIDS</option>
                </select>

                <label for="rate">Rating</label>
                <select  id="rate">
                    <option value="">Select</option>
                    <option value="5">5 Star</option>
                    <option value="4">4 Star</option>
                    <option value="3">3 Star</option>
                    <option value="2">2 Star</option>
                    <option value="1">1 Star</option>
                </select>

                <label for="com">Comments</label>
                <textarea id="com" placeholder="Write your feedback"></textarea>

                <div class="btns">
                <input type="submit" class="submit" value="submit">
                <input type="reset" class="reset" value="reset">
                </div>
            </form>

        </main>

        <footer>
            &copy; copy right <span> 2026 KLH University Hyderabad | Feedback Portal</span>
        </footer>
    </body>
</html>
