<!DOCTYPE html>
<html>

<head>
    <title>My Restaurant</title>
    <style>
        *{
            margin: 0px;
        }
        #header {
            background-image: url("https://images.unsplash.com/photo-1579027989536-b7b1f875659b?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-align: center;
            border: 0px;
            padding: 0px;
            height: 100px;
            margin-bottom: 30px;

        }

        .overlay {
            color: rgba(255, 255, 255, 0.795);
            padding: 0px;
            margin: 0px;
            text-align: center;
        }
        .overlay{
            box-shadow: 1px 10px 10px rgb(0, 0, 0);
        }

        .section {
            background-color: white;
            padding: 20px;
            margin-bottom: 35px;
            border-radius: 6px;
        }

        .content {
            border: 2px rgb(68, 68, 68) solid;
            margin: 5px;
            padding: 10px;
            overflow: auto;

        }

        .left {
            float: left;
            width: 30%;
        }

        .right {
            float: right;
            width: 30%;
            padding-right: 0px;
            margin-right: 0px;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1 class="overlay">Tasty Bites</h1>
        <p class="overlay">Enjoy meals</p>
    </div>

    <div class="section">
        <h2 style="text-align: center;"><u>Menu</u></h2>
        <div class="content" class="section">
            <div class="left">
                <img src="https://www.licious.in/blog/wp-content/uploads/2022/06/chicken-hyderabadi-biryani-01.jpg"
                    alt="biryani" style="width: 100px; height: 100px;">
            </div>
            <div class="left">
                <p style="text-align: center;">Biryani is a delicious south indian dish</p>
            </div>
            <div class="right">
                <p style="text-align: right;">&#8377;499</p>

            </div>
        </div>
        <div class="content" class="section">
            <div class="left">
                <img src="https://spiceindiaonline.com/wp-content/uploads/2021/02/Easy-Paneer-Butter-Masala-1.jpg"
                    alt="paneer butter masala" style="width: 100px; height: 100px;">
            </div>
            <div class="left">
                <p style="text-align: center;">Paneer Butter Masala is a delicious side dish</p>
            </div>
            <div class="right">
                <p style="text-align: right;">&#8377;499</p>


            </div>
        </div>
        <div class="content" class="section">
            <div class="left">
                <img src="https://salasdaily.com/cdn/shop/products/veg_fried_rice.jpg?v=1667533719" alt="veg_fried_rice"
                    style="width: 100px; height: 100px;">
            </div>
            <div class="left">
                <p style="text-align: center;">Veg fried rice is a delicious chinese dish</p>
            </div>
            <div class="right">
                <p style="text-align: right;">&#8377;499</p>

            </div>
        </div>

        
    </div>

</body>

</html>
