    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            height: 15%;
            align-items: center;
            padding: 25px 50px;
            position: fixed;
            background-color:white;
            width: 100%;
            top: 0;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgb(227, 227, 227);
            margin-right: 12px;
        }

        header h2 {
            letter-spacing: 6px;
            font-size: 20px;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        header nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: small;
            padding: 5px 10px;
            border-radius: 3px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 3px 6px rgb(213, 213, 213);
        }


        nav a:hover {
            color: rgb(242, 92, 84);
            box-shadow: 0 3px 10px gray;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            margin-top: 15vh;
            margin-bottom: 15vh;
            background-color: rgb(233, 237, 242);

        }

        nav a.active {
            color: rgb(242, 92, 84);

        }

        footer {
            display: flex;
            height: 15vh;
            padding: 30px;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 0;
            background-color: white;
            width: 100%;
        }
        .projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, auto);
            grid-auto-flow: column;
            gap: 30px;
            padding: 5px 400px;
        }

        .projects .p {
            display: flex;
            box-shadow: 2px 3px 6px rgb(161, 161, 161);
            padding: 15px 60px;
            gap: 10px;
            border-radius: 15px;
            transition: 0.2s;
        }

        .projects .p:hover {
            transform: scale(1.05);
        }

        .projects .p a {
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: large;
            color: rgb(242, 92, 84);
        }

        .projects .p img {
            border-radius: 10px;
        }
         main h1 {
            color: #182f48;
            letter-spacing: 3px;
            line-height: 1.2;
            font-family: 'playfair display', serif;
            font-weight: bold;
            font-size: xxx-large;
            margin-bottom: 30px;
            margin-right: 80%;
        }

    </style>
</head>
