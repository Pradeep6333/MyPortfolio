<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="img/png" href="PF Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            height: 15%;
            align-items: center;
            padding: 25px 50px;
            position: fixed;
            background-color:white;
            width: 100%;
            top: 0;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgb(227, 227, 227);
            margin-right: 12px;
        }

        header h2 {
            letter-spacing: 6px;
            font-size: 20px;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        header nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: small;
            padding: 5px 10px;
            border-radius: 3px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 3px 6px rgb(213, 213, 213);
        }


        nav a:hover {
            color: rgb(242, 92, 84);
            box-shadow: 0 3px 10px gray;
        }

        main {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 70vh;
            margin-top: 15vh;
            margin-bottom: 15vh;
            background-color: rgb(233, 237, 242);

        }

        nav a.active {
            color: rgb(242, 92, 84);

        }

        footer {
            display: flex;
            height: 15vh;
            padding: 30px;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 0;
            background-color: white;
            width: 100%;
        }
        .right img{
            width: 200px;
            border-radius: 200px;
            background-color: #E9EDF2;
            box-shadow: 12px 14px 10px rgb(184, 185, 186);
        }
        .left{
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .left .p1{
            width: 31%;
        }
        .left h1{
            font-family: 'Playfair Display', serif;
            color: #182f48;
            letter-spacing: 1px;
        }
        .left .p2{
            color:rgb(242, 92, 84);
            font-weight: bolder;
        }
        .left a{
            text-decoration: none;
            color: white;
            background-color: rgb(242, 92, 84);
            border-radius: 3px;
            padding: 6px 8px;
            text-align: center;
            width: 115px;
            border: 1px solid rgb(242, 92, 84);
        }
        .left a:hover{
            color: rgb(242, 92, 84);
            background-color: rgb(233, 237, 242);
            cursor: pointer;
            transition: 0.3s;
        }


    </style>
</head>

<body>

    <header>
        <div class="title">
            <button class="logo"><img width="35" src="PF Logo.png" alt="Logo"></button>
            <h2>PORTFOLIO</h2>
        </div>
        <nav>
            <a class="active" href="index.html">Home</a>
            <a class="" href="port_about.html">About</a>
            <a class="" href="port_skills.html">Skills</a>
            <a class="" href="port_projects.html">Projects</a>
            <a class="" href="port_contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="left">
            <h1>I'm Pradeep<br>Designer & Web Developer</h1>
            <p class="p1">I design and build responsive websites that are fast, modern, and tailored to your business goals.</br></p>
            <p class="p2">TURNING IDEAS INTO REALITY.</p>
            <a href="port_projects.html">See Projects</a>
        </div>
        <div class="right">
            <img src="AAAA.png" alt="MyPhoto">
        </div>

    </main>


    <footer>
        <p>&copy; My Portfolio</p>
    </footer>


</body>

</html>
