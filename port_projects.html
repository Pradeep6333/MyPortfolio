<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }


        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            height: 15%;
            align-items: center;
            padding: 25px 50px;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: rgb(242, 92, 84);
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgb(227, 227, 227);
            margin-right: 12px;
        }

        header h2 {
            letter-spacing: 6px;
            font-size: 20px;
        }

        nav {
            display: flex;
            gap: 22px;
        }

        header nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: small;
            padding: 5px 10px;
            border-radius: 3px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 3px 6px rgb(213, 213, 213);
        }

        nav a:hover {
            color: rgb(242, 92, 84);
            box-shadow: 0 3px 10px gray;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70%;
            justify-content: flex-start;
            align-items: flex-start;
            background-color: rgb(233, 237, 242);

        }

        main h1 {
            color: #182f48;
            letter-spacing: 3px;
            line-height: 1.2;
            font-family: 'playfair display', serif;
            font-weight: bold;
            font-size: xxx-large;
            margin-bottom: 30px;
            margin-left: 35px;
        }

        nav a.active {
            color: rgb(242, 92, 84);

        }

        footer {
            display: flex;
            height: 15%;
            padding: 30px;
            justify-content: center;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, auto);
            grid-auto-flow: column;
            gap: 30px;
            padding: 5px 400px;
        }

        .projects .p {
            display: flex;
            box-shadow: 2px 3px 6px rgb(161, 161, 161);
            padding: 15px 60px;
            gap: 10px;
            border-radius: 15px;
            transition: 0.2s;
        }

        .projects .p:hover {
            transform: scale(1.05);
        }

        .projects .p a {
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: large;
            color: rgb(242, 92, 84);
        }

        .projects .p img {
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div class="title">
            <button class="logo"><img width="35" src="PF Logo.png" alt="Logo"></button>
            <h2>PORTFOLIO</h2>
        </div>
        <nav>
            <a class="" href="index.html">Home</a>
            <a class="" href="port_about.html">About</a>
            <a class="" href="port_skills.html">Skills</a>
            <a class="active" href="port_projects.html">Projects</a>
            <a class="" href="port_contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h1>Projects</h1>

        <div class="projects">
            <div class="p"><img src="Portfolio_pic.jpeg" alt="My Portfolio" width="100px" height="100px"><a
                    href="index.html">
                    My Portfolio</a></div>

            <div class="p"><img src="Toyota_pic.png" alt="Toyota Showroom" width="100px" height="100px"><a
                    href="Car_showroom_fwd/home.html">
                    Car Showroom</a></div>

            <div class="p"><img src="p1.png" alt="Restaurant" width="100px" height="100px"><a
                    href="restaurant.html">Restaurant Menu</a></div>

            <div class="p"><img src="p2.jpg" alt="FeedBackForm" width="100px" height="100px"><a href="clgfeedback.html">
                    FeedBack Form</a></div>
        </div>


    </main>


    <footer>
        <p>&copy; My Portfolio</p>
    </footer>


</body>

</html>
